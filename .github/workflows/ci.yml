name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            central-server/*.gradle*
            central-server/gradle/wrapper/gradle-wrapper.properties

      - name: Ensure Gradle wrapper is executable
        working-directory: central-server
        run: chmod +x ./gradlew

      - name: Start MySQL
        run: docker compose up -d mysql-master

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if docker compose exec -T mysql-master mysqladmin ping -h localhost -prootpassword --silent; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs mysql-master
          exit 1

      - name: Run tests
        working-directory: central-server
        run: ./gradlew test
