name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "central-server/**"
      - "docker-compose.yml"
      - "infra/mysql/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "central-server/**"
      - "docker-compose.yml"
      - "infra/mysql/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Ensure Gradle wrapper is executable
        working-directory: central-server
        run: chmod +x ./gradlew

      - name: Restore MySQL image cache
        id: mysql-image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image-cache/mysql-8.0.tar
          key: mysql-image-8.0-${{ runner.os }}

      - name: Load MySQL image cache
        if: steps.mysql-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-image-cache/mysql-8.0.tar

      - name: Pull and save MySQL image
        if: steps.mysql-image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-image-cache
          docker pull mysql:8.0
          docker save mysql:8.0 -o /tmp/docker-image-cache/mysql-8.0.tar

      - name: Start MySQL
        run: docker compose up -d mysql-master

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if docker compose exec -T mysql-master mysqladmin ping -h localhost -prootpassword --silent; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs mysql-master
          exit 1

      - name: Run tests
        working-directory: central-server
        run: ./gradlew test --no-daemon
