global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ===== Spring Boot Actuator 메트릭 수집 =====
  - job_name: 'central-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['central-server:8080']
        labels:
          application: 'central-server'

  # ===== Prometheus 자체 메트릭 =====
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
