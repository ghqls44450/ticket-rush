version: "3.8"

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ticket
    ports:
      - "13306:3306"
    volumes:
      - ./infra/mysql/master/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./infra/mysql/master/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-master-data:/var/lib/mysql
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-slave-1:
    image: mysql:8.0
    container_name: mysql-slave-1
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "13307:3306"
    volumes:
      - ./infra/mysql/slave-1/my.cnf:/etc/mysql/conf.d/my.cnf
      - mysql-slave1-data:/var/lib/mysql
    networks:
      - ticket-network
    depends_on:
      mysql-master:
        condition: service_healthy

  mysql-slave-2:
    image: mysql:8.0
    container_name: mysql-slave-2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "13308:3306"
    volumes:
      - ./infra/mysql/slave-2/my.cnf:/etc/mysql/conf.d/my.cnf
      - mysql-slave2-data:/var/lib/mysql
    networks:
      - ticket-network
    depends_on:
      mysql-master:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ticket-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - ticket-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - grafana-data:/var/lib/grafana
    networks:
      - ticket-network
    depends_on:
      - prometheus

networks:
  ticket-network:
    driver: bridge

volumes:
  mysql-master-data:
  mysql-slave1-data:
  mysql-slave2-data:
  prometheus-data:
  grafana-data:
